name: iOS TestFlight (EAS Cloud)

# Builds a signed iOS release on EAS's macOS cloud and submits it to TestFlight.
# Signing credentials (distribution cert + provisioning profile) are created and
# stored by EAS automatically using the App Store Connect API key exposed via the
# EXPO_ASC_* / EXPO_APPLE_TEAM_ID env vars below — no manual .p12/.mobileprovision.
#
# Manual trigger only (Actions tab → Run workflow) to control EAS build credits.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build/submit profile"
        default: production
        type: string

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-submit:
    name: EAS build + submit to TestFlight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write .env (read at Metro bundle time via react-native-dotenv)
        env:
          ENV_FILE: ${{ secrets.BUILDGYM_ENV_FILE }}
        run: printf '%s' "$ENV_FILE" > .env

      - name: Write App Store Connect API key (.p8)
        # Written to the project root so eas.json submit.ascApiKeyPath (./asc-api-key.p8)
        # resolves. Excluded from the EAS build upload by .easignore (*.p8).
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: printf '%s' "$ASC_API_KEY_P8" > asc-api-key.p8

      - name: EAS build + auto-submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Lets EAS authenticate to App Store Connect non-interactively so it can
          # create/reuse the iOS distribution cert + provisioning profile and submit.
          EXPO_ASC_API_KEY_PATH: ${{ github.workspace }}/asc-api-key.p8
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EXPO_APPLE_TEAM_TYPE: INDIVIDUAL
        run: |
          eas build \
            --platform ios \
            --profile "${{ inputs.profile }}" \
            --non-interactive \
            --auto-submit-with-profile "${{ inputs.profile }}"
