name: EAS Build (iOS Simulator)

on:
  push:
    branches:
      - ci/eas-ios-build
  workflow_dispatch:

jobs:
  build:
    name: EAS Build (local, macOS)
    runs-on: macos-15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write .env
        env:
          ENV_FILE: ${{ secrets.BUILDGYM_ENV_FILE }}
        run: printf '%s' "$ENV_FILE" > .env

      - name: Build iOS simulator (EAS local)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli build --platform ios --profile ios-simulator --local --non-interactive --output build.tar.gz

      - name: Upload simulator build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build.tar.gz
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            /Users/runner/.expo/eas-build-local-node-modules
            /Users/runner/Library/Logs/EASBuild
            **/*.log
          retention-days: 14
          if-no-files-found: ignore
