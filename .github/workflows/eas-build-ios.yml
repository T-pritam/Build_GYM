name: EAS Build (iOS)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: false
        default: "ios-simulator"

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build on EAS
        run: eas build --platform ios --profile ${{ github.event.inputs.profile || 'ios-simulator' }} --non-interactive
